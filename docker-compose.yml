services:
  backend:
    build: ./backend
    expose:
      - '3000'
    environment:
      PORT: 3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - '80'
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
